<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peak Edition Graphing Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.0/math.js"></script>
</head>
<body>

<div class="app">
    <section class="graph-container">
        <canvas id="graphCanvas"></canvas>
        <div id="coordinates">Center: (0.00, 0.00)</div>
        <div class="graph-buttons">
            <button id="zoomIn" title="Zoom In">+</button>
            <button id="zoomOut" title="Zoom Out">−</button>
            <button id="reset" title="Recenter Origin">⌂</button>
        </div>
    </section>

    <section class="panel">
        <header class="toolbar">
            <h2>Graph Calculator</h2>
            <button id="saveBtn">Save Workspace</button>
        </header>

        <div id="expressions"></div>

        <button id="addExpression">+ Add Expression</button>

        <div class="keypad-container">
            <div class="keypad-tabs">
                <button class="tab-btn active" data-tab="main">123</button>
                <button class="tab-btn" data-tab="funcs">f(x)</button>
                <button class="tab-btn" data-tab="abc">abc</button>
            </div>
            <div id="keypad"></div>
        </div>
    </section>
</div>

<script src="js/parser.js"></script>
<script src="js/expressions.js"></script>
<script src="js/graph.js"></script>
<script src="js/keypad.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
